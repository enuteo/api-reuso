<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - Reuso</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Menânica</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="cadastro-cliente.html" class="active">Novo Cliente</a></li>
            <li><a href="cadastro-usuario.html">Novo Usuário</a></li>
            <li><a href="login.html">Sair</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="header-row">
            <h1>Cadastrar Novo Cliente</h1>
        </div>
        
        <div class="form-card">
            
            <form id="formCliente" onsubmit="event.preventDefault(); criarCliente();">
                <div class="form-group">
                    <label>Nome / Razão Social</label>
                    <input type="text" id="clienteNome" required>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>CPF / CNPJ</label>
                        <input type="text" id="clienteDocumento" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="clienteTelefone">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="clienteEmail" required>
                </div>
                
                <button type="submit" id="btnSalvarCliente" class="btn btn-primary mt-3">Salvar Cliente</button>
            </form>

        </div>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
