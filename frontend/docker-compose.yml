services:
  forge-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge-workshop:latest
    container_name: forge-workshop
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
