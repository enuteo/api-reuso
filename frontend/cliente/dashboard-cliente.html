<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Oficina</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">Oficina System</div>
            <nav class="sidebar-nav">
                <a href="dashboard-cliente.html" class="active">Meu Painel</a>
                <a href="cliente-andamento.html">Serviços em Andamento</a>
                <a href="cliente-historico.html">Meu Histórico</a>
                <a href="cliente-perfil.html">Editar Cadastro</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../comum/login.html" class="btn" style="background: var(--danger); text-align: center;">Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Bem-vindo, <span id="clienteNome">cliente</span></h1>
                <p>Acompanhe os serviços contratados.</p>
            </header>

            <div class="dashboard-grid">
                <div class="stat-card">
                    <h3>Serviços Contratados</h3>
                    <div class="value" id="statServicos">—</div>
                </div>
            </div>

            <div class="content-section">
                <h2>Meus Serviços</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Serviço</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaServicos">
                        <tr><td colspan="3">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const sessao = API.session.get();
        if (!sessao || sessao.classe !== 1 || sessao.id == null) {
            window.location.href = '../comum/login.html';
        }

        function escapeHtml(v) {
            return String(v ?? '').replace(/[&<>"']/g, (c) =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!sessao) return;
            document.getElementById('clienteNome').textContent = sessao.nome || 'cliente';
            const tabela = document.getElementById('tabelaServicos');
            try {
                const servicos = await API.getServicosCliente(sessao.id);
                document.getElementById('statServicos').textContent = servicos.length;
                tabela.innerHTML = servicos.length
                    ? servicos.map((s) => `
                        <tr>
                            <td>${escapeHtml(s.descricao)}</td>
                            <td>${escapeHtml(s.keyword)}</td>
                            <td>R$ ${Number(s.preco).toFixed(2)}</td>
                        </tr>`).join('')
                    : '<tr><td colspan="3">Nenhum serviço contratado.</td></tr>';
            } catch (err) {
                tabela.innerHTML = '<tr><td colspan="3">Falha ao carregar serviços.</td></tr>';
                API.notify(err.message);
            }
        });
    </script>
</body>
</html>
