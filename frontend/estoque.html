                        <th>Quantidade</th>

                <tbody id="tbodyEstoque">
                    <tr>
                        <td>#001</td>
                        <td>Motor Elétrico Trifásico</td>

                    </tr>
                    <tr>
                        <td>#002</td>
                        <td>Rolamento Esférico</td>

                        <td><span class="badge badge-danger">Esgotado</span></td>
