<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Novo Cliente</h2>
            <form id="formCadastro" action="login.html" method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input type="text" id="telefone" name="telefone" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                    <small style="color: var(--text-muted);">Você usará este e-mail para entrar no sistema.</small>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <button type="submit" class="btn">Criar Conta</button>
            </form>
            <div class="auth-links">
                <p>Já possui conta? <a href="login.html">Voltar para o Login</a></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        API.bindForm('#formCadastro', API.cadastrarCliente, {
            successMessage: 'Conta criada! Faça login com o seu nome e senha.',
            onSuccess: () => { setTimeout(() => { window.location.href = 'login.html'; }, 1200); }
        });
    </script>
</body>
</html>
