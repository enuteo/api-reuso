<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Oficina</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Gestão Oficina</h2>
            <form id="formLogin" method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
            <div class="auth-links">
                <p>É cliente e não possui conta? <a href="cadastro-cliente.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        API.bindForm('#formLogin', API.login, {
            onSuccess: (data) => {
                // classe 0 = Funcionário | 1 = Cliente
                window.location.href = (data.classe === 0)
                    ? '../usuario/dashboard-usuario.html'
                    : '../cliente/dashboard-cliente.html';
            }
        });
    </script>
</body>
</html>
