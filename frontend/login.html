<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Reuso</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="full-page">
        <div class="form-card">
            
            <div class="text-center">
                <h2>Bem-vindo</h2>
                <p class="text-muted">Acesse sua conta</p>
            </div>
            
            <form id="formLogin" onsubmit="event.preventDefault(); fazerLogin();">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="exemplo@email.com">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="btnLogin" class="btn btn-primary w-full">Entrar</button>
            </form>

        </div>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
