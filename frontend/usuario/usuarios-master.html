<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Master - Oficina</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">Oficina System</div>
            <nav class="sidebar-nav">
                <a href="dashboard-usuario.html">Dashboard</a>
                <a href="servicos-andamento.html">Serviços em Andamento</a>
                <a href="servicos-historico.html">Histórico de Serviços</a>
                <a href="servicos-lista.html">Lista de Serviços</a>
                <a href="pecas-estoque.html">Estoque de Peças</a>
                <a href="pecas-lista.html">Lista de Peças</a>
                <a href="usuarios-master.html" id="nav-master" class="active">Gestão de Usuários</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../comum/login.html" class="btn" style="background: var(--danger); text-align: center;">Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Gestão Master</h1>
                <p>Administração de credenciais de Funcionários e Clientes.</p>
            </header>

            <div class="dashboard-grid">
                <div class="content-section">
                    <h2>Cadastrar Novo Usuário</h2>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="tipoUsuario">Tipo de Conta</label>
                            <select id="tipoUsuario" name="tipoUsuario">
                                <option value="funcionario">Funcionário</option>
                                <option value="cliente">Cliente</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" name="nome" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail de Acesso</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Senha Provisória</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn">Registrar no Sistema</button>
                    </form>
                </div>

                <div class="content-section">
                    <h2>Usuários do Sistema</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Perfil</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaUsuarios">
                            <tr><td colspan="3">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const tabelaUsuarios = document.getElementById('tabelaUsuarios');

        function escapeHtml(v) {
            return String(v ?? '').replace(/[&<>"']/g, (c) =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        async function carregarUsuarios() {
            try {
                const usuarios = await API.request('/api/clientes/usuario');
                tabelaUsuarios.innerHTML = usuarios.length
                    ? usuarios.map((u) => `
                        <tr>
                            <td>${escapeHtml(u.nome)}</td>
                            <td>${u.classe === 0 ? 'Funcionário' : 'Cliente'}</td>
                            <td><a href="#" data-acao="remover" data-id="${u.id}" style="color: var(--danger);">Remover</a></td>
                        </tr>`).join('')
                    : '<tr><td colspan="3">Nenhum usuário.</td></tr>';
            } catch (err) {
                tabelaUsuarios.innerHTML = '<tr><td colspan="3">Falha ao carregar usuários.</td></tr>';
                API.notify(err.message);
            }
        }

        // Cadastro de novo usuário
        document.querySelector('form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('password').value,
                classe: document.getElementById('tipoUsuario').value === 'funcionario' ? 0 : 1
            };
            try {
                const res = await API.request('/api/clientes/usuario/cadastro', { method: 'POST', body: payload });
                API.notify(res.mensagem || 'Usuário registrado!', 'success');
                event.target.reset();
                carregarUsuarios();
            } catch (err) {
                API.notify(err.message);
            }
        });

        // Remover usuário (delete físico)
        tabelaUsuarios.addEventListener('click', async (event) => {
            const link = event.target.closest('[data-acao="remover"]');
            if (!link) return;
            event.preventDefault();
            if (!confirm('Remover este usuário permanentemente?')) return;
            try {
                await API.request(`/api/clientes/usuario/${link.dataset.id}`, { method: 'DELETE' });
                API.notify('Usuário removido.', 'success');
                carregarUsuarios();
            } catch (err) {
                API.notify(err.message);
            }
        });

        document.addEventListener('DOMContentLoaded', carregarUsuarios);
    </script>
</body>
</html>
