<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Oficina</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">Oficina System</div>
            <nav class="sidebar-nav">
                <a href="dashboard-usuario.html">Dashboard</a>
                <a href="servicos-andamento.html">Serviços em Andamento</a>
                <a href="servicos-historico.html">Histórico de Serviços</a>
                <a href="servicos-lista.html">Lista de Serviços</a>
                <a href="pecas-estoque.html" class="active">Estoque de Peças</a>
                <a href="pecas-lista.html">Lista de Peças</a>
                <a href="usuarios-master.html" id="nav-master">Gestão de Usuários</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../comum/login.html" class="btn" style="background: var(--danger); text-align: center;">Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Controle de Estoque</h1>
                <p>Monitoramento quantitativo e reposição de inventário.</p>
            </header>

            <div class="content-section">
                <h2>Inventário Atual</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Peça</th>
                            <th>Qtd. Atual</th>
                            <th>Status do Estoque</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEstoque">
                        <tr><td colspan="4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const LIMITE_CRITICO = 10; // limiar puramente visual (client-side)
        const tabelaEstoque = document.getElementById('tabelaEstoque');

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (c) =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function badgeStatus(qtd) {
            return qtd <= LIMITE_CRITICO
                ? '<span class="badge warning" style="background: var(--danger);">Crítico</span>'
                : '<span class="badge success">Normal</span>';
        }

        async function carregarEstoque() {
            try {
                const itens = await API.listarEstoque();
                if (!itens.length) {
                    tabelaEstoque.innerHTML = '<tr><td colspan="4">Estoque vazio.</td></tr>';
                    return;
                }
                tabelaEstoque.innerHTML = itens.map((e) => `
                    <tr>
                        <td>${e.pecaId}</td>
                        <td>${escapeHtml(e.pecaNome)}</td>
                        <td>${e.quantidade} un</td>
                        <td>${badgeStatus(e.quantidade)}</td>
                    </tr>`).join('');
            } catch (err) {
                tabelaEstoque.innerHTML = '<tr><td colspan="4">Falha ao carregar estoque.</td></tr>';
                API.notify(err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarEstoque);
    </script>
</body>
</html>
